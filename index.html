<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mga Isla — Tagalog Islands</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF6EE;
    --paper:#F3EDE1;
    --ink:#16332E;
    --teal:#1F5B52;
    --mango:#E17A3F;
    --coral:#F0A868;
    --sea:#4C7C82;
    --line:#E2D9C6;
    --danger:#B4553D;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}

  /* ---------- App bar ---------- */
  .appbar{
    position:sticky;top:0;z-index:20;
    background:var(--cream);
    border-bottom:1px solid var(--line);
    padding:14px 18px calc(14px + env(safe-area-inset-top,0px)) 18px;
    padding-top:calc(14px + env(safe-area-inset-top,0px));
    display:flex;align-items:center;justify-content:space-between;
  }
  .appbar .title{font-size:22px;font-weight:600;letter-spacing:-0.01em;}
  .appbar .sub{font-size:12px;color:var(--sea);font-weight:500;margin-top:1px;}
  .icon-btn{
    width:40px;height:40px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink);flex-shrink:0;
  }
  .icon-btn:active{background:var(--line);}

  main{max-width:640px;margin:0 auto;padding:18px 16px 120px 16px;}

  /* ---------- Search ---------- */
  .search{
    display:flex;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:10px 14px;margin-bottom:22px;
  }
  .search input{
    border:none;outline:none;background:transparent;flex:1;
    font-family:'Inter';font-size:15px;color:var(--ink);
  }
  .search svg{flex-shrink:0;color:var(--sea);}

  /* ---------- Wave divider (signature element) ---------- */
  .island-header{display:flex;align-items:baseline;gap:10px;margin:30px 0 10px 0;}
  .island-header:first-child{margin-top:0;}
  .island-header h2{font-size:20px;font-weight:600;margin:0;color:var(--teal);}
  .island-header .count{font-size:12px;color:var(--sea);font-weight:500;}
  .wave{width:100%;height:10px;margin-bottom:14px;}
  .wave path{stroke:var(--coral);stroke-width:2;fill:none;opacity:0.55;}

  /* ---------- Cards ---------- */
  .card{
    background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:14px 16px;margin-bottom:10px;
    display:flex;align-items:center;gap:12px;
  }
  .play-btn{
    width:44px;height:44px;border-radius:50%;flex-shrink:0;
    background:var(--teal);color:#fff;border:none;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .play-btn:active{background:var(--ink);}
  .play-btn.no-audio{background:var(--paper);color:var(--sea);border:1px dashed var(--sea);}
  .card-text{flex:1;min-width:0;}
  .card-text .tl{font-family:'Fraunces';font-size:17px;font-weight:500;line-height:1.25;}
  .card-text .en{font-size:13px;color:var(--sea);margin-top:2px;}
  .card-text .note{font-size:12px;color:var(--mango);margin-top:4px;font-style:italic;}
  .del-btn{
    width:32px;height:32px;flex-shrink:0;border:none;background:transparent;
    color:var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .del-btn:active{color:var(--danger);}

  .empty{
    text-align:center;padding:60px 20px;color:var(--sea);
  }
  .empty h3{color:var(--ink);font-size:19px;margin-bottom:6px;}
  .empty p{font-size:14px;line-height:1.5;max-width:320px;margin:0 auto;}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;
    bottom:calc(24px + env(safe-area-inset-bottom,0px));
    width:58px;height:58px;border-radius:50%;
    background:var(--mango);color:#fff;border:none;
    box-shadow:0 6px 18px rgba(225,122,63,0.45);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:25;
  }
  .fab:active{background:var(--teal);}

  /* ---------- Sheets / modals ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(22,51,46,0.4);
    z-index:40;display:none;align-items:flex-end;justify-content:center;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--cream);width:100%;max-width:640px;
    border-radius:22px 22px 0 0;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px)) 20px;
    max-height:88vh;overflow-y:auto;
    animation:slideup 0.22s ease-out;
  }
  @keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet h2{font-size:20px;margin:0 0 16px 0;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--sea);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:6px;}
  .field input, .field select{
    width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    font-family:'Inter';font-size:15px;background:#fff;color:var(--ink);outline:none;
  }
  .field input:focus, .field select:focus{border-color:var(--teal);}
  .field .hint{font-size:12px;color:var(--sea);margin-top:5px;line-height:1.4;}
  .field .hint a{color:var(--teal);}

  .dir-toggle{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .dir-toggle button{
    flex:1;padding:11px;border:none;background:#fff;font-family:'Inter';
    font-size:13px;font-weight:600;color:var(--sea);cursor:pointer;
  }
  .dir-toggle button.active{background:var(--teal);color:#fff;}

  .btn-row{display:flex;gap:10px;margin-top:18px;}
  .btn{
    flex:1;padding:13px;border-radius:12px;border:none;
    font-family:'Inter';font-size:15px;font-weight:600;cursor:pointer;
  }
  .btn-primary{background:var(--mango);color:#fff;}
  .btn-primary:disabled{background:var(--line);color:var(--sea);}
  .btn-secondary{background:var(--paper);color:var(--ink);}

  .status{font-size:13px;color:var(--sea);margin-top:10px;min-height:18px;display:flex;align-items:center;gap:6px;}
  .status.error{color:var(--danger);}
  .spinner{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--mango);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .preview{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:14px;
  }
  .preview .tl{font-family:'Fraunces';font-size:19px;font-weight:500;}
  .preview .en{font-size:14px;color:var(--sea);margin-top:3px;}
</style>
</head>
<body>

<div class="appbar">
  <div>
    <div class="title">Mga Isla</div>
    <div class="sub">Tagalog language islands</div>
  </div>
  <button class="icon-btn" onclick="openSettings()" aria-label="Settings">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<main>
  <div class="search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="searchInput" placeholder="Search your phrases" oninput="render()">
  </div>
  <div id="list"></div>
</main>

<button class="fab" onclick="openAdd()" aria-label="Add phrase">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- Add phrase sheet -->
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <h2>Add a phrase</h2>

    <div class="field">
      <label>Direction</label>
      <div class="dir-toggle">
        <button id="dirEn" class="active" onclick="setDir('en')">English → Tagalog</button>
        <button id="dirTl" onclick="setDir('tl')">Tagalog → English</button>
      </div>
    </div>

    <div class="field">
      <label id="inputLabel">Phrase (English)</label>
      <input id="phraseInput" placeholder="e.g. Have you eaten yet?">
    </div>

    <div class="field">
      <label>Island (topic)</label>
      <input id="islandInput" list="islandList" placeholder="e.g. Greetings, Family dinner">
      <datalist id="islandList"></datalist>
    </div>

    <div id="preview"></div>
    <div class="status" id="addStatus"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-primary" id="translateBtn" onclick="handleTranslate()">Translate</button>
    </div>
    <div class="btn-row" id="saveRow" style="display:none;">
      <button class="btn btn-secondary" onclick="handleTranslate()">Redo</button>
      <button class="btn btn-primary" id="saveBtn" onclick="handleSave()">Save phrase</button>
    </div>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>Settings</h2>
    <div class="field">
      <label>ElevenLabs API key</label>
      <input id="apiKeyInput" type="password" placeholder="sk_...">
      <div class="hint">Free at <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> → Profile → API Keys. Stored only on this device.</div>
    </div>
    <div class="field">
      <label>Voice ID</label>
      <input id="voiceIdInput" placeholder="21m00Tcm4TlvDq8ikWAM">
      <div class="hint">Default works, but for a proper Filipino accent, search "Filipino" in the <a href="https://elevenlabs.io/app/voice-library" target="_blank">Voice Library</a> and paste that voice's ID here.</div>
    </div>
    <div class="status" id="settingsStatus"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeSettings()">Close</button>
      <button class="btn btn-primary" onclick="saveSettingsHandler()">Save</button>
    </div>
  </div>
</div>

<audio id="player"></audio>

<script>
let phrases = [];
let settings = { apiKey: '', voiceId: '21m00Tcm4TlvDq8ikWAM' };
let dir = 'en'; // 'en' = English->Tagalog input, 'tl' = Tagalog->English input
let pendingTranslation = null; // {tagalog, english, note}

const WAVE_SVG = `<svg class="wave" viewBox="0 0 300 10" preserveAspectRatio="none"><path d="M0 5 Q 15 0 30 5 T 60 5 T 90 5 T 120 5 T 150 5 T 180 5 T 210 5 T 240 5 T 270 5 T 300 5"/></svg>`;

async function loadData(){
  try{
    const p = await window.storage.get('phrases', false);
    phrases = p ? JSON.parse(p.value) : [];
  }catch(e){ phrases = []; }
  try{
    const s = await window.storage.get('settings', false);
    if(s) settings = JSON.parse(s.value);
  }catch(e){ /* no settings yet */ }
  render();
}

async function savePhrases(){
  try{ await window.storage.set('phrases', JSON.stringify(phrases), false); }
  catch(e){ console.error('save failed', e); }
}
async function saveSettings(){
  try{ await window.storage.set('settings', JSON.stringify(settings), false); }
  catch(e){ console.error('save settings failed', e); }
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  const list = document.getElementById('list');
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = phrases.filter(p =>
    !q || p.tagalog.toLowerCase().includes(q) || p.english.toLowerCase().includes(q) || p.island.toLowerCase().includes(q)
  );

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">
      <h3>${phrases.length === 0 ? 'No islands yet' : 'No matches'}</h3>
      <p>${phrases.length === 0 ? 'Tap the + button to add your first phrase and start building your islands.' : 'Try a different search.'}</p>
    </div>`;
    return;
  }

  const islands = {};
  filtered.forEach(p => {
    const key = p.island || 'Uncategorized';
    if(!islands[key]) islands[key] = [];
    islands[key].push(p);
  });

  let html = '';
  Object.keys(islands).sort().forEach(island => {
    html += `<div class="island-header"><h2>${escapeHtml(island)}</h2><span class="count">${islands[island].length}</span></div>`;
    html += WAVE_SVG;
    islands[island].forEach(p => {
      html += `<div class="card">
        <button class="play-btn ${p.audio ? '' : 'no-audio'}" onclick="playAudio('${p.id}')" aria-label="Play">
          ${p.audio
            ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'
            : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'}
        </button>
        <div class="card-text">
          <div class="tl">${escapeHtml(p.tagalog)}</div>
          <div class="en">${escapeHtml(p.english)}</div>
          ${p.note ? `<div class="note">${escapeHtml(p.note)}</div>` : ''}
        </div>
        <button class="del-btn" onclick="deletePhrase('${p.id}')" aria-label="Delete">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
        </button>
      </div>`;
    });
  });
  list.innerHTML = html;

  // refresh island suggestions
  const uniqueIslands = [...new Set(phrases.map(p => p.island).filter(Boolean))];
  document.getElementById('islandList').innerHTML = uniqueIslands.map(i => `<option value="${escapeHtml(i)}">`).join('');
}

function playAudio(id){
  const p = phrases.find(x => x.id === id);
  if(!p || !p.audio) return;
  const player = document.getElementById('player');
  player.src = p.audio;
  player.play();
}

function deletePhrase(id){
  phrases = phrases.filter(p => p.id !== id);
  savePhrases();
  render();
}

/* ---------------- Add flow ---------------- */
function openAdd(){
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('phraseInput').value = '';
  document.getElementById('islandInput').value = '';
  document.getElementById('preview').innerHTML = '';
  document.getElementById('addStatus').textContent = '';
  document.getElementById('addStatus').className = 'status';
  document.getElementById('saveRow').style.display = 'none';
  document.getElementById('translateBtn').parentElement.style.display = 'flex';
  pendingTranslation = null;
}
function closeAdd(){ document.getElementById('addOverlay').classList.remove('open'); }

function setDir(d){
  dir = d;
  document.getElementById('dirEn').classList.toggle('active', d === 'en');
  document.getElementById('dirTl').classList.toggle('active', d === 'tl');
  document.getElementById('inputLabel').textContent = d === 'en' ? 'Phrase (English)' : 'Phrase (Tagalog)';
  document.getElementById('phraseInput').placeholder = d === 'en' ? 'e.g. Have you eaten yet?' : 'e.g. Kumain ka na ba?';
}

function setStatus(el, msg, isError){
  el.className = 'status' + (isError ? ' error' : '');
  el.innerHTML = msg;
}
function setStatusLoading(el, msg){
  el.className = 'status';
  el.innerHTML = `<span class="spinner"></span>${msg}`;
}

async function handleTranslate(){
  const text = document.getElementById('phraseInput').value.trim();
  const island = document.getElementById('islandInput').value.trim();
  const statusEl = document.getElementById('addStatus');
  if(!text){ setStatus(statusEl, 'Type a phrase first.', true); return; }

  setStatusLoading(statusEl, 'Translating…');
  document.getElementById('translateBtn').disabled = true;

  try{
    const langpair = dir === 'en' ? 'en|tl' : 'tl|en';
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langpair}`);
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    const translated = data && data.responseData && data.responseData.translatedText;
    if(!translated) throw new Error('No translation returned');

    const tagalog = dir === 'en' ? translated : text;
    const english = dir === 'en' ? text : translated;

    pendingTranslation = { tagalog, english, note: '', island };
    document.getElementById('preview').innerHTML = `
      <div class="preview">
        <div class="tl">${escapeHtml(parsed.tagalog)}</div>
        <div class="en">${escapeHtml(parsed.english)}</div>
      </div>`;
    setStatus(statusEl, 'Looks good? Save it below, or redo.', false);
    document.getElementById('saveRow').style.display = 'flex';
  }catch(e){
    console.error(e);
    setStatus(statusEl, 'Translation failed. Check your connection and try again.', true);
  }finally{
    document.getElementById('translateBtn').disabled = false;
  }
}

async function handleSave(){
  const statusEl = document.getElementById('addStatus');
  if(!pendingTranslation){ setStatus(statusEl, 'Translate first.', true); return; }
  document.getElementById('saveBtn').disabled = true;

  const entry = {
    id: 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    tagalog: pendingTranslation.tagalog,
    english: pendingTranslation.english,
    note: pendingTranslation.note,
    island: pendingTranslation.island || 'Uncategorized',
    audio: null,
    createdAt: Date.now()
  };

  if(!settings.apiKey){
    setStatus(statusEl, 'Saved without audio — add an ElevenLabs API key in Settings to enable audio.', false);
    phrases.push(entry);
    await savePhrases();
    render();
    setTimeout(closeAdd, 1400);
    return;
  }

  setStatusLoading(statusEl, 'Generating audio…');
  try{
    const audioRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${settings.voiceId}`, {
      method: 'POST',
      headers: {
        'xi-api-key': settings.apiKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text: entry.tagalog,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
      })
    });
    if(!audioRes.ok){
      const errText = await audioRes.text().catch(()=> '');
      throw new Error('TTS request failed: ' + audioRes.status + ' ' + errText.slice(0,150));
    }
    const blob = await audioRes.blob();
    entry.audio = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
    setStatus(statusEl, 'Saved with audio.', false);
  }catch(e){
    console.error(e);
    setStatus(statusEl, 'Saved, but audio generation failed: ' + e.message, true);
  }

  phrases.push(entry);
  await savePhrases();
  render();
  document.getElementById('saveBtn').disabled = false;
  setTimeout(closeAdd, 1400);
}

/* ---------------- Settings ---------------- */
function openSettings(){
  document.getElementById('apiKeyInput').value = settings.apiKey || '';
  document.getElementById('voiceIdInput').value = settings.voiceId || '21m00Tcm4TlvDq8ikWAM';
  document.getElementById('settingsStatus').textContent = '';
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('open'); }
async function saveSettingsHandler(){
  settings.apiKey = document.getElementById('apiKeyInput').value.trim();
  settings.voiceId = document.getElementById('voiceIdInput').value.trim() || '21m00Tcm4TlvDq8ikWAM';
  await saveSettings();
  const statusEl = document.getElementById('settingsStatus');
  setStatus(statusEl, 'Saved.', false);
  setTimeout(closeSettings, 700);
}

loadData();
</script>
</body>
</html>
